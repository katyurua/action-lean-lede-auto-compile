name: OpenWrt Builder   # 工作流名称，将显示在 GitHub Actions 界面中

on:
  repository_dispatch:  # 允许通过外部 Webhook 触发（例如从其他仓库或服务调用）
  workflow_dispatch:    # 允许手动在 GitHub Actions 页面点击触发
  schedule:
    # 每周日 UTC 20:17 自动运行（对应北京时间 20:17 + 8h）
    # UTC 20:17 避开了整点高峰，周六相对周日更空闲
    - cron: '17 20 * * 0'

permissions:
  contents: write

env:
  # ========== 源码相关配置 ==========
  REPO_URL: https://github.com/coolsnowwolf/lede   # OpenWrt 源码仓库地址，这里使用的是 Lean's LEDE 源
  REPO_BRANCH: master                             # 要克隆的分支

  # ========== 编译配置文件 ==========
  FEEDS_CONF: feeds.conf.default   # 自定义 feeds 配置文件，放在仓库根目录下可替换默认 feeds 源
  CONFIG_FILE: .config             # 编译配置文件，需提前准备好并放在仓库根目录（可使用 make menuconfig 生成）

  # ========== 自定义脚本 ==========
  DIY_P1_SH: diy-part1.sh          # 自定义脚本第一阶段：在拉取源码后、更新 feeds 前执行，通常用于修改 feeds 源或添加插件
  DIY_P2_SH: diy-part2.sh          # 自定义脚本第二阶段：在安装 feeds 后、开始编译前执行，通常用于修改编译配置、添加自定义文件等

  # ========== 上传控制开关 ==========
  UPLOAD_BIN_DIR: false            # 是否上传整个 bin 目录（默认关闭，因为体积较大）
  UPLOAD_FIRMWARE: true            # 是否上传整理后的固件目录（仅包含生成的固件文件）
  UPLOAD_RELEASE: true             # 是否将固件发布为 GitHub Release

  TZ: Asia/Shanghai                # 时区设置，用于保证日志时间与国内一致

jobs:
  build:                           # 唯一作业：编译
    runs-on: ubuntu-22.04          # 使用 Ubuntu 22.04 虚拟环境

    steps:
    # Step 1: 检出仓库代码（包含配置文件与自定义脚本）
    - name: Checkout
      uses: actions/checkout@main

    # Step 2: 初始化编译环境，安装所需的依赖包
    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive   # 避免 apt 安装时弹出交互式配置界面
      run: |
        # 清理不必要的预装软件和 Docker 镜像以释放磁盘空间（GitHub Actions 磁盘空间有限）
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
        sudo docker image prune --all --force
        # 更新软件包列表
        sudo -E apt-get -qq update
        # 安装编译 OpenWrt 所需的全部依赖工具链
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        # 自动卸载不再需要的依赖包
        sudo -E apt-get -qq autoremove --purge
        # 清理 apt 缓存
        sudo -E apt-get -qq clean
        # 设置系统时区
        sudo timedatectl set-timezone "$TZ"
        # 创建工作目录并赋予当前用户权限
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    # Step 3: 克隆 OpenWrt 源码到 /workdir/openwrt，并建立软链接到工作区
    - name: Clone source code
      working-directory: /workdir
      run: |
        df -hT $PWD                      # 查看磁盘空间
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt   # 方便后续步骤直接使用 openwrt 路径

    # Step 4: 加载自定义 feeds 配置和执行第一阶段的 DIY 脚本
    - name: Load custom feeds
      run: |
        # 如果仓库根目录存在 FEEDS_CONF 文件，则用它覆盖默认的 feeds.conf.default
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        # 赋予第一阶段脚本执行权限并运行（脚本位于仓库根目录）
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    # Step 5: 更新所有 feeds（下载 feeds 索引）
    - name: Update feeds
      run: cd openwrt && ./scripts/feeds update -a

    # Step 6: 安装所有 feeds 中的软件包
    - name: Install feeds
      run: cd openwrt && ./scripts/feeds install -a

    # Step 7: 加载自定义配置（如 .config），并执行第二阶段的 DIY 脚本
    - name: Load custom configuration
      run: |
        # 如果仓库中包含 files 目录，则移动到 openwrt 中（files 目录下的内容会被覆盖到固件根目录）
        [ -e files ] && mv files openwrt/files
        # 如果仓库中包含 .config 编译配置文件，则移动到 openwrt 中
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        # 赋予第二阶段脚本执行权限并运行
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    # Step 8: 下载所有需要的软件包源码（预下载，避免编译时网络问题）
    - name: Download package
      id: package
      run: |
        cd openwrt
        # 用预置的 .config 生成默认配置，确保下载列表完整
        make defconfig
        # 多线程下载（8线程），提高下载速度
        make download -j8
        # 查找并列出下载不完整的小文件（通常大小 < 1024 字节表示下载失败）
        find dl -size -1024c -exec ls -l {} \;
        # 删除这些损坏的下载文件，以便后续重新下载
        find dl -size -1024c -exec rm -f {} \;

    # Step 9: 编译固件
    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"          # 输出使用的线程数
        # 先使用所有 CPU 线程编译，如果失败则改用单线程，最后加上 V=s 输出详细日志以排查问题
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT    # 记录编译状态为成功（供后续步骤条件判断）
        # 从 .config 中提取目标设备名称，例如 DEVICE_xxx，用于生成制品名称
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        # 如果提取到了设备名，则设置环境变量 DEVICE_NAME（前缀加下划线）
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        # 生成时间戳作为文件日期
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    # Step 10: 检查磁盘空间使用情况（无论之前步骤是否失败都执行）
    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    # Step 11: 上传整个 bin 目录（仅当 UPLOAD_BIN_DIR 为 true 且编译成功）
    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: OpenWrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}   # 制品名称包含设备名与时间
        path: openwrt/bin

    # Step 12: 整理固件文件，移除 packages 子目录（仅保留固件），并设置环境变量 FIRMWARE 指向最终固件目录
    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()   # 条件：上传固件开关开启 且 工作流未取消
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages                                  # 删除软件包目录，仅保留固件文件
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV              # 记录固件所在路径
        echo "status=success" >> $GITHUB_OUTPUT

    # Step 13: 上传整理后的固件目录为 GitHub Actions 制品
    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    # Step 14: 生成 Release 标签（Tag）
    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT   # 标签格式如 2026.05.10-1200
        touch release.txt                                                # 创建 Release 说明文件
        # 如果存在 GoFile 上传步骤的输出 URL，则添加到说明中（该工作流未定义此步骤，可忽略或自定义）
        [ ${UPLOAD_GOFILE} = true && ${{ steps.gofile.outputs.url }} ] && echo "🔗 [GoFile](${{ steps.gofile.outputs.url }})" >> release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    # Step 15: 将固件上传到 GitHub Release
    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      # 使用默认的 GitHub Token 进行认证
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt                         # Release 正文来自 release.txt
        files: ${{ env.FIRMWARE }}/*                   # 上传固件目录下的所有文件

    # Step 16: 删除旧的 Workflow 运行记录，仅保留最近的几次
    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0           # 不按天数保留
        keep_minimum_runs: 2     # 最少保留 2 次运行记录

    # Step 17: 移除旧的 Release 版本，仅保留最新的 3 个
    - name: Remove old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3           # 保留最新的 3 个 Release
        delete_tags: true        # 同时删除对应的 Git 标签
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
